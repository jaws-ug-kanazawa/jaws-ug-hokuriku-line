{% assign hashtag_source = include.hashtag | default: page.hashtag %}
{% if hashtag_source %}
    {% assign page_hashtags = hashtag_source | join: " " %}
    <div class="hashtag-buttons">
        <p class="hashtag-text">{{ page_hashtags }}</p>
        <button type="button" class="button button-primary" data-hashtags="{{ page_hashtags | escape }}" onclick="copyHashtags(this)">
            <span class="icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></span><span class="label">ハッシュタグをコピー</span>
        </button>
        <a href="https://x.com/intent/post?text={{ page_hashtags | url_encode }}" class="button button-primary" rel="nofollow noopener">
            <span class="icon">{% include icon-x.svg %}</span><span class="label">で投稿</span>
        </a>
        <button type="button" class="button button-primary webshare-button" data-share-text="{{ page_hashtags | escape }}" onclick="shareHashtags(this)" hidden>
            <span class="icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.66 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg></span><span class="label">シェア</span>
        </button>
    </div>
    <script>
        function copyHashtags(button) {
            var hashtags = button.getAttribute("data-hashtags");
            var label = button.querySelector(".label");
            navigator.clipboard.writeText(hashtags).then(function () {
                var originalText = label.textContent;
                label.textContent = "コピーしました";
                setTimeout(function () {
                    label.textContent = originalText;
                }, 2000);
            });
        }
        function shareHashtags(button) {
            var text = button.getAttribute("data-share-text");
            if (navigator.share) {
                navigator.share({ text: text }).catch(function () {});
            }
        }
        if (navigator.share) {
            document.querySelectorAll(".hashtag-buttons .webshare-button").forEach(function (btn) {
                btn.hidden = false;
            });
        }
    </script>
    <style>
    .hashtag-buttons {
        margin-top: 20px;
        margin-bottom: 20px;
    }
    .hashtag-buttons .hashtag-text {
        margin-bottom: 10px;
        text-align: left;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    .hashtag-buttons .button[hidden] {
        display: none;
    }
    .hashtag-buttons .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 38px;
        padding: 0 15px;
        font-size: 14px;
        line-height: 38px;
        box-sizing: border-box;
        vertical-align: middle;
        border: none;
        cursor: pointer;
    }
    .hashtag-buttons .icon {
        display: inline-flex;
        margin-right: 5px;
    }
    .hashtag-buttons .icon svg {
        width: 16px;
        height: 16px;
    }
    .hashtag-buttons .icon svg path {
        fill: #ffffff;
    }
    </style>
{% endif %}
