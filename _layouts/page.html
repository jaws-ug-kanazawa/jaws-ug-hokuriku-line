---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {% if page.ext_url %}
      <p>自動で外部サイトへ移動します。移動しない場合は以下のリンクをクリックしてください。</p>
      <p><a href="{{ page.ext_url }}">{{ page.ext_url }}</a></p>
    {% endif %}
    {{ content }}
  </div>

  {% include share-x.html %}

</article>
